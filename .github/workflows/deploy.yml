name: CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  validate:
    name: Lint, Type Check & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type Check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      # - name: Test
      #   run: npm test   # Uncomment when tests are added

  deploy:
    name: Automatic Vercel Deploy (Production)
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Debug Vercel Secrets
        run: |
          echo "Checking Secrets..."
          echo "VERCEL_TOKEN is ${{ secrets.VERCEL_TOKEN != '' && 'SET' || 'EMPTY' }}"
          echo "VERCEL_ORG_ID is ${{ secrets.VERCEL_ORG_ID != '' && 'SET' || 'EMPTY' }}"
          echo "VERCEL_PROJECT_ID is ${{ secrets.VERCEL_PROJECT_ID != '' && 'SET' || 'EMPTY' }}"

      - name: Pull Vercel Environment Information
        if: "${{ secrets.VERCEL_TOKEN != '' }}"
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build Project Artifacts
        if: "${{ secrets.VERCEL_TOKEN != '' }}"
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy Project to Vercel
        if: "${{ secrets.VERCEL_TOKEN != '' }}"
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
